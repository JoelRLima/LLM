name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core and development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Installed entry point smoke test
        run: python -c "from agent.interfaces.cli import main; assert callable(main)"

      - name: Ruff
        run: ruff check .

      - name: Repository quality policy
        run: python scripts/check_quality.py

      - name: Mypy
        run: mypy

      - name: Pytest
        env:
          AGENT_RUNTIME_DIR: ${{ runner.temp }}/llm-agent-runtime
        run: pytest -q
